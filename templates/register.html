{% extends 'base.html' %}
{% block title %}Register — Modest Sakina{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo">Modest <span>Sakina</span></div>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Join our community of modest fashion lovers</p>

    <form action="{{ url_for('auth.register') }}" method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" class="form-control" required placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Create a strong password" minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" required placeholder="Repeat your password">
      </div>
      <button type="submit" class="btn-primary" style="width:100%;border:none;cursor:pointer;font-size:1rem;padding:14px;margin-top:5px;">
        Create Account →
      </button>
    </form>

    <div style="text-align:center;margin-top:25px;font-size:0.9rem;color:var(--text-light);">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--gold);font-weight:600;">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
