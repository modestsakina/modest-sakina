{% extends 'base.html' %}
{% block title %}Login — Modest Sakina{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo">Modest <span>Sakina</span></div>
    </div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your account to continue shopping</p>

    <form action="{{ url_for('auth.login') }}" method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Your password">
      </div>
      <button type="submit" class="btn-primary" style="width:100%;border:none;cursor:pointer;font-size:1rem;padding:14px;margin-top:5px;">
        Sign In →
      </button>
    </form>

    <div style="text-align:center;margin-top:25px;font-size:0.9rem;color:var(--text-light);">
      Don't have an account? <a href="{{ url_for('auth.register') }}" style="color:var(--gold);font-weight:600;">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
